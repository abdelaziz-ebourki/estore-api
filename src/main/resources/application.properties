# MySQL Configuration
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:estoredb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# SQL Initialization
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# MongoDB
spring.data.mongodb.uri=mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DATABASE:estore_reviews}

# Server
server.port=9090

# Security (JWT Config)
estore.jwt.secret=${JWT_SECRET:9a4f434241454247424a424b424c424d424e424f425042514252425342544255}
estore.jwt.expiration=86400000

# Upload
app.upload.dir=${UPLOAD_DIR:uploads}
