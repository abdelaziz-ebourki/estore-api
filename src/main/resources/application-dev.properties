# H2 in-memory for dev testing
spring.datasource.url=jdbc:h2:mem:estoredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MongoDB via Docker
spring.data.mongodb.uri=mongodb://localhost:27017/estore_reviews

estore.jwt.secret=${JWT_SECRET:9a4f434241454247424a424b424c424d424e424f425042514252425342544255}
estore.jwt.expiration=86400000

server.port=9090

app.upload.dir=uploads
